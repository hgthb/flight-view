<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR VIEW A.21</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --table-bg: #161b22;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 5px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
        }

        .title-group {
            display: flex; align-items: center; gap: 8px;
        }

        h2 { margin: 0; color: #58a6ff; font-size: 0.95rem; letter-spacing: 1px; }

        #btn-export-pdf {
            background-color: #238636;
            color: #ffffff;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        #btn-export-pdf:hover { background-color: #2ea043; }
        #btn-export-pdf:active { transform: scale(0.95); }

        #status-bar { font-size: 0.7em; color: #8b949e; display: flex; align-items: center; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background-color: #8b949e; margin-right: 4px; display: inline-block; }
        .status-dot.active { background-color: #2ea043; box-shadow: 0 0 5px #2ea043; }
        .status-dot.error { background-color: #da3633; }

        .input-group {
            display: flex; gap: 5px; margin-bottom: 10px; background: #21262d; padding: 5px; border-radius: 6px; border: 1px solid var(--border);
            align-items: center; justify-content: flex-start;
        }
        .input-group input {
            background: #0d1117; border: 1px solid #30363d; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center; font-size: 12px;
        }
        
        .table-wrapper { overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background-color: var(--table-bg); font-size: 11px; white-space: nowrap; }
        
        th, td { padding: 4px 2px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        th {
            background-color: #21262d;
            color: #ff0000;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px #000;
        }
        
        .col-idx { 
            text-align: center; 
            width: 25px; 
            font-weight: 900; 
            text-shadow: 1px 1px 2px #000; 
        }
        
        td.col-idx { color: #d99a6c; }

        @keyframes blink-flying {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .blink-status { animation: blink-flying 2s infinite; }

        .pair-blue { background-color: rgba(0, 220, 255, 0.5); border-left: 4px solid #00d4ff; } 
        .pair-brown { background-color: rgba(255, 180, 0, 0.5); border-left: 4px solid #ffcc00; }
        .standalone { background-color: rgba(255, 50, 50, 0.35); border-left: 4px solid #ff3333; }

        .flight-cell { display: flex; flex-direction: column; }
        .flight-id { color: #ffffff; font-weight: 900; font-size: 1.15em; text-shadow: 2px 2px 2px #000; }
        .reg-id { color: #ffff00; font-size: 0.9em; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .route-cell { display: flex; flex-direction: column; max-width: 110px; overflow: hidden; }
        .route-main { font-weight: 800; color: #ffffff; font-size: 1em; margin-bottom: 2px; text-shadow: 1px 1px 2px #000; }
        
        .ac-info { font-size: 0.85em; color: #e2e8f0; display: flex; align-items: center; text-shadow: 1px 1px 1px rgba(0,0,0,0.8); }
        .duration-text { color: #ffff00; font-weight: bold; margin-left: 4px; display: flex; align-items: center; }
        
        .type-pill { display: inline-block; padding: 0px 3px; border-radius: 2px; font-size: 8px; font-weight: bold; margin-right: 3px; vertical-align: middle; box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .pill-arr { background: #1e40af; color: #ffffff; }
        .pill-dep { background: #166534; color: #ffffff; }

        .time-box { display: flex; flex-direction: column; font-family: 'Consolas', monospace; font-size: 0.95em; text-shadow: 1px 1px 1px #000; }
        .time-row { display: flex; align-items: center; margin-bottom: 1px; }
        
        .prefix { font-weight: bold; margin-right: 2px; font-size: 0.8em; width: 10px; display: inline-block; }
        .p-sched { color: #cbd5e1; } 
        .p-est { color: #facc15; }   
        .p-real { color: #4ade80; }  

        .t-sched { color: #ffffff; font-weight: bold; }
        .t-est { color: #fef08a; font-weight: bold; }
        .t-real { color: #00ff00; font-weight: 900; }
        
        /* --- CHỈNH SỬA CHO A.21 --- */
        .status-cell { 
            font-weight: bold; 
            font-size: 0.85em; 
            white-space: normal !important; 
            word-wrap: break-word; 
            min-width: 75px; /* Giảm từ 100px để tránh bị lấp trên màn hình hẹp */
        }
        
        .st-box { 
            padding: 4px; border-radius: 3px; display: flex; flex-wrap: wrap; justify-content: center; text-align: center;
            gap: 3px; text-transform: uppercase; font-size: 9px; align-items: center; min-width: 65px; 
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); line-height: 1.3;
            word-break: break-word;
            white-space: normal !important;
        }
        
        .st-c-plan { background: #334155; color: #ffffff; }
        .st-c-live { background: #00ffff; color: #000000; font-weight: 900; box-shadow: 0 0 5px #00ffff; }
        .st-c-done { background: #16a34a; color: #ffffff; }
        .st-c-unk { background: #4b5563; color: #e5e7eb; }

        @keyframes text-blink-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        .st-yellow-blink {
            animation: text-blink-status 0.8s infinite !important;
            font-weight: 900 !important;
            color: #d9a000 !important; 
            background-color: #ffffff !important;
            border: 1px solid #000000 !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        .st-red-blink {
            animation: text-blink-status 0.8s infinite !important;
            font-weight: 900 !important;
            color: #ff0000 !important;
            background-color: #ffffff !important;
            border: 1px solid #000000 !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        .st-urgent-blink {
            animation: text-blink-status 0.8s infinite !important;
            font-weight: 900 !important;
            color: #ff0000 !important; 
            background-color: #ffffff !important;
            border: 1px solid #0000ff !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        .st-red-blue-border {
            font-weight: 900 !important;
            color: #ff0000 !important; 
            background-color: #ffffff !important;
            border: 1px solid #0000ff !important;
            text-shadow: none !important;
            box-shadow: none !important;
        }

        .empty-msg { text-align: center; padding: 15px; color: #8b949e; font-style: italic; }
        
        #over-limit-msg { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: #ef4444; font-size: 2rem; font-weight: 900; 
            z-index: 10000; justify-content: center; align-items: center; flex-direction: column;
        }

        @media (min-width: 768px) {
            body { padding: 20px; }
            h2 { font-size: 1.2rem; }
            #btn-export-pdf { font-size: 12px; padding: 4px 12px; }
            #status-bar { font-size: 1em; }
            
            .input-group { padding: 10px; gap: 15px; margin-bottom: 20px; }
            .input-group input { font-size: 16px; padding: 8px 12px; width: 80px !important; }
            .input-group input[type="date"] { width: 150px !important; }

            table { font-size: 14px; }
            th, td { padding: 10px 15px; }
            th { font-size: 0.9rem; }
            .col-idx { width: 40px; font-size: 1.1em; }

            .pair-blue, .pair-brown, .standalone { border-left-width: 4px; }

            .flight-id { font-size: 1.3em; }
            .reg-id { font-size: 1em; }
            
            .route-cell { max-width: none; }
            .route-main { font-size: 1.2em; margin-bottom: 5px; }
            .ac-info { font-size: 1em; }
            .type-pill { padding: 2px 6px; font-size: 10px; }

            .time-box { font-size: 1.1em; }
            .prefix { width: 15px; margin-right: 5px; }
            
            .status-cell { font-size: 1em; }
            .st-box { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div id="over-limit-msg">
    <div>⚠️ OVER LIMIT !</div>
    <div style="font-size: 1rem; color: #888; margin-top: 10px;">Vui lòng liên hệ Admin</div>
</div>

<div class="container">
    <div class="header">
        <div class="title-group">
            <h2>RADAR VIEW A.21</h2>
            <button id="btn-export-pdf" title="Xuất danh sách ra PDF">PDF</button>
        </div>
        <div id="status-bar">
            <span class="status-dot" id="dot"></span>
            <span id="status-text">Checking...</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="v-airport" placeholder="CODE" oninput="this.value = this.value.toUpperCase()" style="width: 50px; text-transform: uppercase;" autocomplete="off">
        <input type="date" id="v-date" style="width: 110px;">
        <div id="total-flights" style="margin-left: auto; font-size: 13.2px; font-weight: bold; color: #ffffff;">Tổng : 0 chuyến</div>
    </div>

    <div class="table-wrapper" id="pdf-target">
        <div id="pdf-date-header" style="display: none; text-align: center; padding: 10px; font-size: 16px; font-weight: bold; color: #58a6ff; border-bottom: 1px solid var(--border); margin-bottom: 10px; text-transform: uppercase;"></div>
        
        <table id="radar-table">
            <thead>
                <tr>
                    <th class="col-idx">#</th>
                    <th>Chuyến</th>
                    <th>Lộ trình</th>
                    <th>Dep</th>
                    <th>Arr</th>
                    <th>Stt</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="6" class="empty-msg">Vui lòng nhập CODE / Chọn ngày...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://pleiku-flight-radar-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pleiku-flight-radar" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const airportInput = document.getElementById('v-airport');
    const dateInput = document.getElementById('v-date');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const tableBody = document.getElementById('table-body');
    const limitMsg = document.getElementById('over-limit-msg');
    const totalFlightsElem = document.getElementById('total-flights');
    const btnExportPdf = document.getElementById('btn-export-pdf');

    btnExportPdf.addEventListener('click', () => {
        const targetElement = document.getElementById('pdf-target');
        const code = airportInput.value || "UNKNOWN";
        const date = dateInput.value || "Date";
        
        const pdfHeader = document.getElementById('pdf-date-header');
        if (pdfHeader) {
            const dateParts = date.split('-');
            const displayDate = dateParts.length === 3 ? `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}` : date;
            pdfHeader.innerHTML = `LỊCH BAY CẢNG ${code} - NGÀY ${displayDate}`;
            pdfHeader.style.display = 'block';
        }

        const opt = {
            margin:       0.2,
            filename:     `Radar_${code}_${date}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#0d1117' },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' } 
        };
        
        btnExportPdf.innerText = "Đang xử lý...";
        
        html2pdf().set(opt).from(targetElement).save().then(() => {
            btnExportPdf.innerText = "PDF";
            if (pdfHeader) pdfHeader.style.display = 'none'; 
        }).catch(err => {
            console.error("Lỗi xuất PDF:", err);
            btnExportPdf.innerText = "Lỗi PDF";
            if (pdfHeader) pdfHeader.style.display = 'none'; 
            setTimeout(() => { btnExportPdf.innerText = "PDF"; }, 2000);
        });
    });

    function setTodayVNSafe() {
        if (document.activeElement === dateInput) return false;

        const newDate = new Date(new Date().getTime() + 7*60*60*1000).toISOString().split('T')[0];
        const oldDate = dateInput.value;

        if (oldDate !== newDate) {
            dateInput.value = newDate;
            return true; 
        }
        return false;
    }

    dateInput.value = new Date(new Date().getTime() + 7*60*60*1000).toISOString().split('T')[0];

    window.addEventListener('pageshow', (event) => {
        const isChanged = setTodayVNSafe();
        if ((event.persisted || isChanged) && airportInput.value) {
            triggerLoad();
        }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            const isChanged = setTodayVNSafe();
            if (isChanged && airportInput.value) {
                triggerLoad();
            }
        }
    });

    function getDeviceId() {
        let id = localStorage.getItem('radar_device_id_c13');
        if (!id) {
            id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            localStorage.setItem('radar_device_id_c13', id);
        }
        return id;
    }

    function initApp() {
        const deviceId = getDeviceId();
        const limitRef = ref(db, 'settings/count_link');
        
        get(limitRef).then((snapshot) => {
            let foundCode = "";
            if (snapshot.exists()) {
                const data = snapshot.val();
                const rawList = (typeof data === 'number') ? "" : (data.id_list || "");
                const idArray = rawList.split('\n').filter(l => l.trim() !== '');
                
                for (let line of idArray) {
                    if (line.startsWith(deviceId)) {
                        const parts = line.split(' ');
                        if (parts.length > 1 && parts[1].trim() !== "") {
                            foundCode = parts[1].trim();
                        }
                        break;
                    }
                }
            }
            
            if (foundCode) {
                airportInput.value = foundCode;
                checkLimitAndUpdate(deviceId, foundCode);
            } else {
                airportInput.value = "";
                airportInput.focus();
                statusText.innerText = "Nhập CODE / Chọn ngày";
                dot.className = "status-dot";
            }
        }).catch(err => {
            console.error("Init Error:", err);
            statusText.innerText = "Error Init";
        });
    }

    function checkLimitAndUpdate(deviceId, airportCode) {
        const limitRef = ref(db, 'settings/count_link');

        runTransaction(limitRef, (currentData) => {
            if (currentData === null) {
                return { counts: 1, id_list: deviceId + " " + airportCode };
            }

            let data = typeof currentData === 'number' ? { counts: currentData, id_list: "" } : currentData;
            const currentCount = data.counts || 0;
            const currentList = data.id_list || "";

            let lines = currentList.split('\n').filter(l => l.trim() !== '');
            let foundIndex = -1;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith(deviceId)) {
                    foundIndex = i;
                    break;
                }
            }

            if (foundIndex !== -1) {
                lines[foundIndex] = deviceId + " " + airportCode;
                return {
                    counts: currentCount,
                    id_list: lines.join('\n')
                };
            } else {
                if (currentCount >= 50) {
                    return; 
                }
                lines.push(deviceId + " " + airportCode);
                return {
                    counts: currentCount + 1,
                    id_list: lines.join('\n')
                };
            }
        }).then((result) => {
            if (result.committed) {
                statusText.innerText = "Authorized";
                dot.className = "status-dot active";
                loadData();
            } else {
                get(limitRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        const rawList = (typeof data === 'number') ? "" : (data.id_list || "");
                        const idArray = rawList.split('\n').filter(l => l.trim() !== '');
                        
                        let isAuthorized = false;
                        for (let line of idArray) {
                            if (line.startsWith(deviceId)) {
                                isAuthorized = true;
                                break;
                            }
                        }
                        
                        if (isAuthorized) {
                            statusText.innerText = "Authorized";
                            dot.className = "status-dot active";
                            loadData();
                        } else {
                            limitMsg.style.display = "flex";
                            document.body.style.overflow = "hidden";
                            statusText.innerText = "Over Limit";
                        }
                    } else {
                        statusText.innerText = "Error Data";
                    }
                });
            }
        }).catch(err => {
            console.error("Check Error:", err);
            statusText.innerText = "Error Check";
        });
    }

    let currentListener = null;

    function loadData() {
        const airport = airportInput.value.toUpperCase().trim();
        const date = dateInput.value;

        if(!airport || !date) return;
        
        statusText.innerText = `Loading...`;
        dot.className = "status-dot"; 

        const dataRef = ref(db, `database_flights/${airport}/${date}`);
        
        onValue(dataRef, (snapshot) => {
            if (snapshot.exists()) {
                const rawFlights = Object.values(snapshot.val());
                totalFlightsElem.innerText = `Tổng : ${rawFlights.length} chuyến`; 
                renderTable(rawFlights);
                statusText.innerText = `Online: ${new Date().toLocaleTimeString('vi-VN')}`;
                dot.className = "status-dot active";
            } else {
                totalFlightsElem.innerText = `Tổng : 0 chuyến`; 
                tableBody.innerHTML = '<tr><td colspan="6" class="empty-msg">No Data.</td></tr>';
                statusText.innerText = "No Data";
                dot.className = "status-dot";
            }
        });
    }

    function triggerLoad() {
        const airportCode = airportInput.value.toUpperCase().trim();
        if (!airportCode) {
            airportInput.focus();
            return;
        }
        checkLimitAndUpdate(getDeviceId(), airportCode);
    }

    airportInput.addEventListener('change', triggerLoad);
    dateInput.addEventListener('change', triggerLoad);
    
    airportInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            airportInput.blur();
            triggerLoad();
        }
    });

    function renderTable(rawFlights) {
        if (!rawFlights || rawFlights.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="empty-msg">Trống.</td></tr>';
            return;
        }

        rawFlights.sort((a,b) => (a.raw_sort_time || 0) - (b.raw_sort_time || 0));

        let groups = []; 
        let used = new Set();
        
        rawFlights.forEach(f => {
            const fId = f.flight + "_" + f.raw_sort_time + "_" + f.type;
            if (used.has(fId)) return;
            let currentGroup = [f]; used.add(fId);
            
            if (f.type === 'arr') {
                const pair = rawFlights.find(p => {
                    const pId = p.flight + "_" + p.raw_sort_time + "_" + p.type;
                    if (p.type !== 'dep' || used.has(pId)) return false;
                    if (f.o_iata !== p.d_iata || f.d_iata !== p.o_iata) return false;
                    const fMatch = f.flight.match(/^([A-Z0-9]{2})(\d+)$/);
                    const pMatch = p.flight.match(/^([A-Z0-9]{2})(\d+)$/);
                    if (fMatch && pMatch) {
                        const fCode = fMatch[1]; const fNum = parseInt(fMatch[2]);
                        const pCode = pMatch[1]; const pNum = parseInt(pMatch[2]);
                        if (fCode === pCode && Math.abs(fNum - pNum) === 1) return true;
                    }
                    return false;
                });
                if (pair) { currentGroup.push(pair); used.add(pair.flight + "_" + pair.raw_sort_time + "_" + pair.type); }
            }
            groups.push(currentGroup);
        });

        let html = "";
        let pIdx = 0;
        let globalIndex = 1; 

        groups.forEach(group => {
            const colorClass = group.length > 1 ? (pIdx++ % 2 === 0 ? "pair-blue" : "pair-brown") : "standalone";

            group.forEach(f => {
                const typeLabel = f.type === 'arr' ? 'ĐẾN' : 'ĐI';
                const typeClass = f.type === 'arr' ? 'pill-arr' : 'pill-dep';
                const durationHtml = f.duration ? `<span class="duration-text">|⏳${f.duration}</span>` : '';

                const createTimeRow = (prefix, label, time) => {
                    if (!time || time === "--:--") return "";
                    let pClass = label === 'S' ? 'p-sched' : (label === 'E' ? 'p-est' : 'p-real');
                    let tClass = label === 'S' ? 't-sched' : (label === 'E' ? 't-est' : 't-real');
                    return `<div class="time-row"><span class="prefix ${pClass}">${label}:</span><span class="${tClass}">${time}</span></div>`;
                };

                let depContent = createTimeRow('dep', 'S', f.dep_sched);
                if (f.dep_real && f.dep_real !== "--:--") depContent += createTimeRow('dep', 'A', f.dep_real);
                else if (f.dep_est && f.dep_est !== "--:--") depContent += createTimeRow('dep', 'E', f.dep_est);

                let arrContent = createTimeRow('arr', 'S', f.arr_sched);
                if (f.arr_real && f.arr_real !== "--:--") arrContent += createTimeRow('arr', 'A', f.arr_real);
                else if (f.arr_est && f.arr_est !== "--:--") arrContent += createTimeRow('arr', 'E', f.arr_est);

                let sText = f.status || "UNK";
                let sIcon = f.icon || "✈";
                let sClass = "st-c-plan";
                const upS = sText.toUpperCase();
                
                if(upS.includes("LANDED")) sClass = "st-c-done";
                else if(upS.includes("FLYING") || upS.includes("ACTIVE") || upS.includes("DEPARTED")) {
                    sClass = "st-c-live";
                    if(upS.includes("FLYING")) sClass += " blink-status";
                }
                else if(upS.includes("UNKNOWN") || upS.includes("CANCEL")) sClass = "st-c-unk";

                let extraClass = "";
                if(upS.includes("LAST BOARDING") || upS.includes("LAST CHECK-IN") || upS.includes("GATE CLOSED")) {
                    extraClass = "st-urgent-blink";
                } else if(!upS.includes("SCHEDULED") && !upS.includes("FLYING") && !upS.includes("LANDED")) {
                    extraClass = "st-red-blue-border";
                } else if(upS.includes("LC-IN") || upS.includes("L-BD")) {
                    extraClass = "st-yellow-blink";
                } else if(upS.includes("G-CL")) {
                    extraClass = "st-red-blink";
                }

                let fullStatus = sText;

                html += `
                    <tr class="${colorClass}">
                        <td class="col-idx">${globalIndex++}</td>
                        <td><div class="flight-cell"><span class="flight-id">${f.flight || '---'}</span><span class="reg-id">${f.reg || ''}</span></div></td>
                        <td>
                            <div class="route-cell">
                                <div class="route-main"><span class="type-pill ${typeClass}">${typeLabel}</span>${f.o_iata || '?'}➝${f.d_iata || '?'}</div>
                                <div class="ac-info">
                                    <span>${f.aircraft || ''}</span>
                                    ${durationHtml}
                                </div>
                            </div>
                        </td>
                        <td><div class="time-box">${depContent || '--:--'}</div></td>
                        <td><div class="time-box">${arrContent || '--:--'}</div></td>
                        <td class="status-cell">
                            <span class="st-box ${sClass} ${extraClass}">${sIcon} ${fullStatus}</span>
                        </td>
                    </tr>`;
            });
        });
        tableBody.innerHTML = html;
    }

    initApp();

</script>

</body>
</html>
